{% extends "base.html" %}

{% block content %}
  <h2>Iniciar sesión</h2>
  {% if form.errors %}
    <p>Nombre de usuario o contraseña incorrectos. Por favor, inténtalo de nuevo.</p>
  {% endif %}
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Iniciar sesión</button>
  </form>
{% endblock %}
