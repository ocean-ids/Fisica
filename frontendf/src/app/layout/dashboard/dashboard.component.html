<div class="dashboard-container">
  <app-navbar></app-navbar>
  <div class="dashboard-content">
    <div class="sidebar-wrapper" [class.collapsed]="!sidebarVisible">
      <app-sidebar *ngIf="sidebarVisible"></app-sidebar>
    </div>
    <button class="toggle-btn" (click)="toggleSidebar()" mat-icon-button>
      <mat-icon>{{ sidebarVisible ? 'chevron_left' : 'chevron_right' }}</mat-icon>
    </button>
    <main class="main-content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
