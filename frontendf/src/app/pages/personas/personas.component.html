<div class="container-fluid p-4">
  
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2 class="m-0">Gestión de Personas</h2>
    <div class="d-flex gap-2">
      <button class="btn btn-outline-secondary" [disabled]="isImporting" (click)="dispararImportacion()">
        <i class="bi bi-upload"></i> Importar
      </button>
      <button class="btn btn-primary" (click)="abrirModal()">
        <i class="bi bi-plus-circle"></i> Nueva Persona
      </button>
    </div>
  </div>
   <input #fileInput type="file"
       accept=".csv, application/vnd.openxmlformats-officedocument.spreadsheetml.sheet, .xlsx"
       class="d-none" (change)="onFileSelected($event)">

  <div class="card">
    <div class="card-body">
      <div class="table-responsive">
        <table class="table table-hover table-bordered">
          <thead class="table-light">
            <tr class="text-center">
              <th>Cédula</th>
              <th>Apellidos</th>
              <th>Nombres</th>
              <th>Tipo</th>
              <th>Activo</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody>
            <tr class="text-center" *ngFor="let persona of personas" [class.inactive-row]="persona.is_active === false">
              <td>{{ persona.cedula }}</td>
              <td>{{ persona.apellidos }}</td>
              <td>{{ persona.nombres }}</td>
              <td>
                <span class="badge" [ngClass]="persona.tipo?.startsWith('SUPERVISOR') ? 'bg-success' : 'bg-primary'">
                  {{ persona.tipo }}
                </span>
              </td>
              <td>
                <mat-slide-toggle [checked]="persona.is_active !== false" (change)="toggleActive(persona, $event.checked)">
                </mat-slide-toggle>
              </td>
              <td class="d-flex justify-content-around align-items-center">
                

                <button class="btn btn-sm btn-outline-primary me-2" (click)="abrirModal(persona)">
                  <i class="bi bi-pencil"></i> Editar
                </button>
                <button class="btn btn-sm btn-outline-danger" (click)="confirmarEliminar(persona)">
                  <i class="bi bi-trash"></i> Eliminar
                </button>
              </td>
            </tr>
            <tr *ngIf="personas.length === 0">
              <td colspan="6" class="text-center text-muted py-4">
                No hay personas registradas
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
