<h2 mat-dialog-title>{{ persona.id ? 'Editar' : 'Nueva' }} Persona</h2>

<mat-dialog-content>
  <form [formGroup]="personaForm">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Cédula</mat-label>
      <input type="text" matInput formControlName="cedula" maxlength="10" required>
      <mat-error *ngIf="personaForm.get('cedula')?.hasError('required')">
        La cédula es requerida
      </mat-error>
      <mat-error *ngIf="personaForm.get('cedula')?.hasError('pattern')">
        Sólo dígitos (máximo 10)
      </mat-error>
      <mat-error *ngIf="personaForm.get('cedula')?.hasError('maxlength')">
        Máximo 10 caracteres
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Nombres</mat-label>
      <input matInput formControlName="nombres" required>
      <mat-error *ngIf="personaForm.get('nombres')?.hasError('required')">
        El nombre es requerido
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Apellidos</mat-label>
      <input matInput formControlName="apellidos" required>
      <mat-error *ngIf="personaForm.get('apellidos')?.hasError('required')">
        El apellido es requerido
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Tipo</mat-label>
      <mat-select formControlName="tipo" required>
        <mat-option *ngFor="let tipo of tipos" [value]="tipo">{{ tipo }}</mat-option>
        
      </mat-select>
      <mat-error *ngIf="personaForm.get('tipo')?.hasError('required')">
        El tipo es requerido
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Provincia</mat-label>
      <mat-select formControlName="provincia" (selectionChange)="onProvinciaChange()">
        <mat-option [value]="null">-</mat-option>
        <mat-option *ngFor="let p of provincias" [value]="p.id">{{ p.nombre }}</mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Cantón</mat-label>
      <mat-select formControlName="canton">
        <mat-option [value]="null">-</mat-option>
        <mat-option *ngFor="let c of cantones" [value]="c.id">{{ c.nombre }}</mat-option>
      </mat-select>
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()">Cancelar</button>
  <button mat-raised-button color="primary" (click)="onSubmit()" [disabled]="!personaForm.valid">
    Guardar
  </button>
</mat-dialog-actions>
