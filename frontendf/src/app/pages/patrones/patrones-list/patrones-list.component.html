<div class="container-fluid p-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Patrones de Asignación</h2>
    <button class="btn btn-primary" (click)="abrirNuevoPatron()">
      <i class="bi bi-plus-circle"></i> Nuevo Patrón
    </button>
  </div>
  <div class="card">
    <div class="card-body">
      <div class="table-responsive">
        <table class="table table-hover table-bordered">
          <thead class="table-light">
            <tr class="text-center">
              <th>Código</th>
              <th>Secuencia</th>
              <th class="text-center">Acciones</th>
            </tr>
          </thead>
          <tbody>
            <tr class="text-center" *ngFor="let p of patrones">
              <td>{{ p.codigo }}</td>
              <td>{{ p.secuencia.join('-') }}</td>
              <td class="d-flex justify-content-around">
                <button class="btn btn-sm btn-outline-primary me-2" (click)="abrirEditarPatron(p)">
                  <i class="bi bi-pencil"></i> Editar
                </button>
                <button class="btn btn-sm btn-outline-danger" (click)="eliminarPatron(p.id!)">
                  <i class="bi bi-trash"></i> Eliminar
                </button>
              </td>
            </tr>
            <tr *ngIf="patrones.length === 0">
              <td colspan="3" class="text-center text-muted py-4">No hay patrones registrados</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
