<h2 mat-dialog-title>Observacion</h2>

<mat-dialog-content>
  <div class="readonly-grid">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Nominativo</mat-label>
      <input matInput [value]="data.row.nominativo || '-'" readonly>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Proyecto</mat-label>
      <input matInput [value]="data.row.proyecto || '-'" readonly>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Apellidos y Nombre</mat-label>
      <input matInput [value]="(data.row.apellidos || '') + ' ' + (data.row.nombres || '')" readonly>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Estado</mat-label>
      <input matInput [value]="data.row.estado || '-'" readonly>
    </mat-form-field>
  </div>

  <form [formGroup]="form" class="editable-grid">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Observacion</mat-label>
      <textarea matInput rows="3" formControlName="observacion"></textarea>
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-stroked-button type="button" (click)="cerrar()">Cancelar</button>
  <button mat-raised-button color="primary" type="button" (click)="guardar()" [disabled]="form.invalid">Guardar</button>
</mat-dialog-actions>
