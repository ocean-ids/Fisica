<div class="container-fluid px-1">
  <h3>Consolidado</h3>

  <div class="d-flex gap-2 align-items-center justify-content-between mb-3">
    <div class="d-flex gap-2 align-items-center">
      <input
        type="date"
        lang="es"
        class="form-control"
        style="max-width:200px"
        [value]="filtroFecha"
        (change)="onFechaChange($event)"
        placeholder="dd/mm/aaaa">
    </div>

    <mat-button-toggle-group
      name="turnoFiltro"
      [(ngModel)]="filtroTurno"
      (change)="cargar()"
      aria-label="Filtro de turno">
      <mat-button-toggle value="Diurno">Diurno</mat-button-toggle>
      <mat-button-toggle disabled>Turnos:</mat-button-toggle>
      <mat-button-toggle value="Nocturno">Nocturno</mat-button-toggle>
    </mat-button-toggle-group>

    <div class="d-flex gap-4">
      <button type="button" class="btn btn-outline-primary btn-sm" title="Descargar Excel" aria-label="Descargar Excel" (click)="descargarExcel()" style="background: none; border: none; padding: 0; cursor: pointer; display: flex; flex-direction: column; align-items: center;">
        <img src="assets/images/excel-icon.png" alt="Excel" width="38" height="38" style="vertical-align: middle;" />
      </button>
      <button type="button" class="btn btn-outline-secondary btn-sm" title="Descargar PDF" aria-label="Descargar PDF" (click)="descargarPdf()" style="background: none; border: none; padding: 0; cursor: pointer; display: flex; flex-direction: column; align-items: center;">
        <img src="assets/images/pdf.png" alt="PDF" width="38" height="38" style="vertical-align: middle;" />
      </button>
    </div>
  </div>

  <div *ngIf="loading" class="text-muted">Cargando...</div>

  <div class="table-responsive" *ngIf="!loading">
    <table class="table table-bordered table-hover text-center align-middle">
      <thead class="table-light">
        <tr>
          <th>Nominativo</th>
          <th>Proyecto</th>
          <th>Apellidos y Nombre</th>
          <th>Estado</th>
          <th>Observación</th>
          <th>Acción</th>
        </tr>
      </thead>
      <tbody>
        <ng-container *ngFor="let g of agrupado">
          <tr>
            <td colspan="6" class="fw-bold text-center">{{ g.label }}</td>
          </tr>
          <tr *ngFor="let r of g.rows">
            <td>{{ r.nominativo || '-' }}</td>
            <td>{{ r.proyecto || '-' }}</td>
            <td>{{ getNombreCompleto(r) }}</td>
            <td>{{ r.estado || '-' }}</td>
            <td>
              <span class="text-center">{{ r.observacion || '-' }}</span>
            </td>
            <td>
              <button mat-stroked-button type="button" color="primary" (click)="abrirObservacion(r)" aria-label="Editar observacion">
                <i class="bi bi-pencil"></i>
              </button>
            </td>
          </tr>
        </ng-container>
        <tr *ngIf="agrupado.length === 0">
          <td colspan="6" class="text-muted text-center">Sin registros</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
