<h2 mat-dialog-title>{{ data.instalacion?.id ? 'Editar' : 'Nueva' }} Instalación</h2>

<mat-dialog-content>
  <form [formGroup]="instalacionForm">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Cliente</mat-label>
      <mat-select formControlName="cliente_id" required>
        <mat-option *ngFor="let cliente of data.clientes" [value]="cliente.id">
          {{ cliente.nombre_comercial }}
        </mat-option>
      </mat-select>
      <mat-error *ngIf="instalacionForm.get('cliente_id')?.hasError('required')">
        El cliente es requerido
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Provincia</mat-label>
      <input matInput formControlName="provincia" required>
      <mat-error *ngIf="instalacionForm.get('provincia')?.hasError('required')">
        La provincia es requerida
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Ciudad</mat-label>
      <input matInput formControlName="ciudad" required>
      <mat-error *ngIf="instalacionForm.get('ciudad')?.hasError('required')">
        La ciudad es requerida
      </mat-error>
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()">Cancelar</button>
  <button mat-raised-button color="primary" (click)="onSubmit()" [disabled]="!instalacionForm.valid">
    Guardar
  </button>
</mat-dialog-actions>
