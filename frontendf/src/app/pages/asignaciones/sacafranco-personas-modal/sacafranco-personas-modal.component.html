<h2 mat-dialog-title class="text-center">Seleccionar Persona Sacafranco</h2>

<mat-dialog-content>
    <mat-form-field appearance="outline" class="w-100 mb-3">
        <mat-label>Cantón</mat-label>
        <mat-select [(ngModel)]="selectedCantonId" (selectionChange)="onCantonChange()">
            <mat-option [value]="null" >SIN CANTÓN</mat-option>
            <mat-option *ngFor="let canton of cantones" [value]="canton.id">
                {{canton.nombre}}
            </mat-option>
        </mat-select>
    </mat-form-field>
    <div class="list-group" style="max-height: 320px; overflow: auto;" *ngIf="selectedCantonId !== null; else noCanton">
        <button
            type="button"
            class="list-group-item list-group-item-action"
            *ngFor="let p of personas"
            (click)="selectPersona(p.id)"
            [class.active]="selectedId === p.id"
        >
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <div class="fw-semibold">{{ p.apellidos }} {{ p.nombres }}</div>
                    <small class="text-muted">{{ p.cedula }}</small>
                </div>
                <div class="d-flex align-items-center gap-2">
                    <span class="badge" [ngClass]="isAssigned(p.id) ? 'bg-warning text-dark' : 'bg-success'">
                        {{ isAssigned(p.id) ? 'Asignado' : 'Disponible' }}
                    </span>
                    <span class="badge bg-primary" *ngIf="p.tipo">{{ p.tipo }}</span>
                </div>
            </div>
        </button>
        <div class="text-muted p-2" *ngIf="!personas.length">
            No hay personas sacafranco para mostrar.
        </div>
    </div>
    <ng-template #noCanton>
        <div class="text-muted p-2">Seleccione un cantón para ver sacafrancos.</div>
    </ng-template>
</mat-dialog-content>

<mat-dialog-actions align="end">
    <button mat-button (click)="cancel()">Cancelar</button>
    <button mat-raised-button color="primary" (click)="confirm()" [disabled]="!selectedId">
        Seleccionar
    </button>
</mat-dialog-actions>
