<div>
  <div class="table-responsive">
    <table class="table table-sm table-bordered">
      <thead class="table-light" style="height: 103px;">
        <tr class="text-center align-middle header-row">
          <th *ngFor="let d of weekDays" title="{{d.name}}">
            <div class="header-day">
              <span class="short">{{d.short || ''}}</span>
              <span class="dayNum">{{d.dayNum || ''}}</span>
            </div>
          </th>
          <th class="actions-col" style="width: 60px;">Acción</th>
        </tr>
      </thead>
      <tbody  *ngIf="rows && rows.length>0" >
        <tr style="height: 70px;" *ngFor="let row of rows; let i = index" class="data-row p-0 m-0">
          <ng-container *ngFor="let d of weekDays">
            <td *ngIf="d.date; else emptyDay">
              <ng-container *ngIf="((row[dayKeyFromDate(d.date)] || '').toString().toUpperCase().charAt(0) === 'F'); else normalInput">
                <button class="info-btn btn btn-sm btn-outline-info"
                        (click)="onInfoClick($event, row.puesto, dayKeyFromDate(d.date))"
                        (mouseenter)="showPreview(row.puesto, dayKeyFromDate(d.date))"
                        (mouseleave)="clearPreview(row.puesto, dayKeyFromDate(d.date))"
                        [title]="getPreviewTitle(row.puesto, dayKeyFromDate(d.date))">
                  <div class="cell-inner">
                    <span class="form-control form-control-sm text-center" style="min-width:3rem;">
                      {{ (row[dayKeyFromDate(d.date)] || '').toString().toUpperCase() }}
                    </span>
                      
                  </div>
                </button>
              </ng-container>
              <ng-template #normalInput>
                      <input type="text" maxlength="4" class="form-control form-control-sm"
                        [(ngModel)]="row[dayKeyFromDate(d.date)]"
                        (ngModelChange)="onCellChange(row, dayKeyFromDate(d.date), $event)"
                        [ngModelOptions]="{standalone:true}">
              </ng-template>
            </td>
            <ng-template #emptyDay><td></td></ng-template>
          </ng-container>
          <td class="text-center align-middle actions-col"><button class="btn btn-sm btn-outline-primary" (click)="saveRow(row)"><i class="bi bi-floppy"></i></button></td>
        </tr>
      </tbody>
      <tbody *ngIf="!rows || rows.length===0" >
        <tr>
          <td [attr.colspan]="(weekDays.length || 7) + 1" class="text-center text-muted" style="height:30px">No hay asignaciones semanales para esta semana.</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
