<div>
  <div class="table-responsive">
    <table class="table table-sm table-bordered">
      <thead class="table-light" style="height: 100px;">
        <tr class="text-center align-middle header-row">
          <th *ngFor="let d of weekDays" title="{{d.name}}">
            <div class="header-day">
              <span class="short">{{d.short}}</span>
              <span class="dayNum">{{d.dayNum}}</span>
            </div>
          </th>
          <th class="actions-col" style="width: 60px;">Acción</th>
        </tr>
      </thead>
      <tbody style="height: 120px;" *ngIf="rows && rows.length>0">
        <tr *ngFor="let row of rows; let i = index" class="data-row p-0 m-0">
          <td title="{{row.puesto_detalle?.nombre || row.puesto}}"></td>
          <ng-container *ngFor="let d of weekDays">
            <td>
              <input type="text" maxlength="4" class="form-control form-control-sm"
                     [ngClass]="getCellClass(row[dayKeyFromDate(d.date)])"
                     [(ngModel)]="row[dayKeyFromDate(d.date)]"
                     (ngModelChange)="onCellChange(row, dayKeyFromDate(d.date), $event)"
                     [ngModelOptions]="{standalone:true}">
            </td>
          </ng-container>
          <td class="text-center align-middle actions-col"><button class="btn btn-sm btn-primary" (click)="saveRow(row)">Guardar</button></td>
        </tr>
      </tbody>
      <tbody *ngIf="!rows || rows.length===0">
        <tr>
          <td [attr.colspan]="(weekDays.length || 7) + 1" class="text-center text-muted" style="height:150px">No hay asignaciones semanales para esta semana.</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
 
<i class="bi bi-floppy"></i>btn btn-sm btn-outline-primary
