<h2 mat-dialog-title>Aplicar secuencia</h2>

<mat-dialog-content>
  <div class="range-form">
    <mat-form-field appearance="outline" class="field">
      <mat-label>Desde</mat-label>
      <input matInput type="date" [(ngModel)]="start" (ngModelChange)="onInputChange()" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="field">
      <mat-label>Hasta</mat-label>
      <input matInput type="date" [(ngModel)]="end" (ngModelChange)="onInputChange()" />
    </mat-form-field>

    <mat-form-field appearance="outline" class="field">
      <mat-label>Secuencia</mat-label>
      <input matInput type="text" [(ngModel)]="seq" (ngModelChange)="onInputChange()" placeholder="ejemplo: N, D, F" />
    </mat-form-field>

    <div class="preview" *ngIf="previewRows.length">
      <div class="preview-title">Vista previa</div>
      <div class="preview-sub" *ngIf="rowTitle">{{ rowTitle }}</div>
      <div class="preview-row" *ngFor="let p of previewRows">
        <div class="preview-cell label">{{ p.label }}</div>
        <div class="preview-cell date">{{ p.date }}</div>
        <div class="preview-cell current">{{ p.currentValue || '-' }}</div>
        <div class="preview-cell next">{{ p.newValue || '-' }}</div>
      </div>
      <div class="preview-legend">
        <span class="legend">Actual</span>
        <span class="legend">Nuevo</span>
      </div>
    </div>

    <div class="error" *ngIf="errorText">{{ errorText }}</div>
  </div>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()">Cancelar</button>
  <button mat-raised-button color="primary" (click)="submit()">Aplicar</button>
</mat-dialog-actions>
