<div class="container-fluid d-flex align-items-center justify-content-center min-vh-100 reset-page">
  <div class="row justify-content-center w-100">
    <div class="col-md-5">
      <div class="card shadow">
        <div class="card-body p-5">
          <div class="text-center mb-4">
            <h3 class="card-title">Nueva Contraseña</h3>
            <p class="text-muted">Ingresa tu nueva contraseña</p>
          </div>
          
          <form (ngSubmit)="resetear()">
            <div class="mb-3">
              <label class="form-label">Nueva Contraseña</label>
              <input 
                type="password" 
                class="form-control form-control-lg" 
                [(ngModel)]="password" 
                name="password" 
                placeholder="••••••••"
                required>
            </div>
            
            <div class="mb-4">
              <label class="form-label">Confirmar Contraseña</label>
              <input 
                type="password" 
                class="form-control form-control-lg" 
                [(ngModel)]="passwordConfirm" 
                name="passwordConfirm" 
                placeholder="••••••••"
                required>
            </div>
            
            <button 
              type="submit" 
              class="btn btn-personalizado  btn-lg w-100" 
              [disabled]="guardando">
              <span *ngIf="!guardando">Restablecer Contraseña</span>
              <span *ngIf="guardando">
                <span class="spinner-border spinner-border-sm me-2"></span>
                Guardando...
              </span>
            </button>
          </form>
          
          <div class="text-center mt-4">
            <a routerLink="/login" class="link-personalizado text-decoration-none">
              <i class="bi bi-arrow-left"></i> Volver al login
            </a>
          </div>
          
          <div *ngIf="error" class="alert alert-danger mt-4 mb-0">
            <i class="bi bi-exclamation-triangle me-2"></i>{{ error }}
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
