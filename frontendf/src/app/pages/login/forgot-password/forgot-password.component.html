<div class="container">
  <div class="row justify-content-center" style="min-height: 100vh; align-items: center;">
    <div class="col-md-5">
      <div class="card shadow">
        <div class="card-body p-5">
          <div class="text-center mb-4">
            <h3 class="card-title">Recuperar Contraseña</h3>
            <p class="text-muted">Ingresa tu correo electrónico y te enviaremos un enlace para restablecer tu contraseña.</p>
          </div>
          
          <form (ngSubmit)="enviar()">
            <div class="mb-3">
              <label class="form-label">Correo Electrónico</label>
              <input 
                type="email" 
                class="form-control form-control-lg" 
                [(ngModel)]="email" 
                name="email" 
                placeholder="correo@ejemplo.com"
                required>
            </div>
            
            <button 
              type="submit" 
              class="btn btn-personalizado  btn-lg w-100" 
              [disabled]="enviando">
              <span *ngIf="!enviando">Enviar Enlace</span>
              <span *ngIf="enviando">
                <span class="spinner-border spinner-border-sm me-2"></span>
                Enviando...
              </span>
            </button>
          </form>
          
          <div class="text-center mt-4">
            <a routerLink="/login" class="link-personalizado text-decoration-none">
              <i class="bi bi-arrow-left"></i> Volver al login
            </a>
          </div>
          
          <div *ngIf="mensaje" class="alert alert-info mt-4 mb-0">
            <i class="bi bi-info-circle me-2"></i>{{ mensaje }}
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
