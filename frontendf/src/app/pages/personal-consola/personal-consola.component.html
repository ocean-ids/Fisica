<div class="container-fluid px-0">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2 class="m-0">Personal Consola</h2>
    <button class="btn btn-outline-primary" (click)="abrirModal()">
      <i class="bi bi-plus-circle"></i> Nuevo Personal
    </button>
  </div>

  <div class="d-flex gap-2 mb-3">
    <select class="form-select" [(ngModel)]="filtroTurno" style="max-width:200px">
      <option value="">Turno</option>
      <option value="Diurno">Diurno</option>
      <option value="Nocturno">Nocturno</option>
    </select>
    <button class="btn btn-outline-secondary" (click)="cargar()">Filtrar</button>
  </div>

  <div class="table-responsive">
    <table class="table table-bordered table-hover text-center align-middle">
      <thead class="table-light">
        <tr>
          <th>Turno</th>
          <th>Cedula</th>
          <th>Apellidos</th>
          <th>Nombres</th>
          <th>Tipo</th>
          <th>Activo</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let p of lista">
          <td>{{ p.turno }}</td>
          <td>{{ p.cedula || '-' }}</td>
          <td>{{ p.apellidos }}</td>
          <td>{{ p.nombres }}</td>
          <td>{{ p.tipo }}</td>
          <td>
            <mat-slide-toggle
              [checked]="p.is_active"
              (change)="toggleActivo(p, $event.checked)">
            </mat-slide-toggle>
          </td>
          <td class="d-flex justify-content-around align-middle">
            <button class="btn btn-outline-primary" (click)="abrirModal(p)">
              <i class="bi bi-pencil"></i> Editar
            </button>
            <button class="btn btn-outline-danger" (click)="eliminar(p)">
              <i class="bi bi-trash"></i> Eliminar
            </button>
          </td>
        </tr>
        <tr *ngIf="lista.length === 0">
          <td colspan="7" class="text-muted text-center">Sin registros</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
