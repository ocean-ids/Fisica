<h2 mat-dialog-title>{{ horario?.id ? 'Editar' : 'Nuevo' }} Horario</h2>

<mat-dialog-content>
  <form [formGroup]="horarioForm">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Hora Ingreso</mat-label>
      <input matInput type="time" formControlName="hora_ingreso" required>
      <mat-error *ngIf="horarioForm.get('hora_ingreso')?.hasError('required')">
        La hora de ingreso es requerida
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Hora Salida</mat-label>
      <input matInput type="time" formControlName="hora_salida" required>
      <mat-error *ngIf="horarioForm.get('hora_salida')?.hasError('required')">
        La hora de salida es requerida
      </mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Patrón</mat-label>
      <mat-select formControlName="patron_id">
        <mat-option [value]="null">Sin patrón</mat-option>
        <mat-option *ngFor="let p of patrones" [value]="p.id">
          {{ p.codigo }} ({{ p.secuencia.join('-') }})
        </mat-option>
      </mat-select>
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()">Cancelar</button>
  <button mat-raised-button color="primary" (click)="onSubmit()" [disabled]="!horarioForm.valid">
    Guardar
  </button>
</mat-dialog-actions>
