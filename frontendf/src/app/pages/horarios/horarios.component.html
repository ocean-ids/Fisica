<div class="container-fluid p-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Gesti�n de Horarios</h2>
    <button class="btn btn-primary" (click)="abrirModal()">
      <i class="bi bi-plus-circle"></i> Nuevo Horario
    </button>
  </div>
  <div class="card">
    <div class="card-body">
      <div class="table-responsive">
        <table class="table table-hover">
          <thead class="table-light">
            <tr class="text-center">
              <th>Denominativo</th>
              <th>Hora Ingreso</th>
              <th>Hora Salida</th>
              <th class="text-center">Acciones</th>
            </tr>
          </thead>
          <tbody>
            <tr class="text-center" *ngFor="let horario of horarios">
              <td>{{ horario.denominativo }}</td>
              <td>{{ horario.hora_ingreso }}</td>
              <td>{{ horario.hora_salida }}</td>
              <td class="d-flex justify-content-around">
                <button class="btn btn-sm btn-outline-primary me-2" (click)="abrirModal(horario)">
                  <i class="bi bi-pencil"></i> Editar
                </button>
                <button class="btn btn-sm btn-outline-danger" (click)="eliminarHorario(horario.id!)">
                  <i class="bi bi-trash"></i> Eliminar
                </button>
              </td>
            </tr>
            <tr *ngIf="horarios.length === 0">
              <td colspan="5" class="text-center text-muted py-4">
                No hay horarios registrados
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
