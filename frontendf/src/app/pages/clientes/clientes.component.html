<div class="container-fluid p-4">
  
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Gestión de Clientes</h2>
    <button class="btn btn-primary" (click)="openDialog()">
      <i class="bi bi-plus-circle"></i> Nuevo Cliente
    </button>
  </div>

  <div class="card">
    <div class="card-body">
      <div class="table-responsive">
        <table class="table table-hover table-bordered">
          <thead class="table-light">
            <tr class="text-center">
              <th>RUC</th>
              <th>Razón Social</th>
              <th>Nombre Comercial</th>
              <th class="text-center">Acciones</th>
            </tr>
          </thead>
          <tbody>
            <tr class="text-center" *ngFor="let c of clientes">
              <td>{{ c.ruc || '-' }}</td>
              <td>{{ c.razon_social }}</td>
              <td>{{ c.nombre_comercial }}</td>
              <td class="d-flex justify-content-around">
                <button class="btn btn-sm btn-outline-primary me-2" (click)="openDialog(c)">
                  <i class="bi bi-pencil"></i> Editar
                </button>
                <button class="btn btn-sm btn-outline-danger" (click)="confirmarEliminar(c)">
                  <i class="bi bi-trash"></i> Eliminar
                  
                </button>
              </td>
            </tr>
          </tbody>
        </table>
        
        <div *ngIf="clientes.length === 0" class="text-center text-muted py-4">
          <p>No hay clientes registrados</p>
        </div>
      </div>
    </div>
  </div>
</div>
