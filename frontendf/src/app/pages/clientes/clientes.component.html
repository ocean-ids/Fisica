<mat-card>
  <mat-card-header>
    <mat-card-title>Clientes</mat-card-title>
  </mat-card-header>

  <mat-card-content>
    <div class="actions">
      <button mat-raised-button color="primary">
        <mat-icon>add</mat-icon>
        Nuevo Cliente
      </button>
    </div>

    <table mat-table [dataSource]="clientes" class="mat-elevation-z2">
      <ng-container matColumnDef="razon_social">
        <th mat-header-cell *matHeaderCellDef>Razón Social</th>
        <td mat-cell *matCellDef="let c">{{ c.razon_social }}</td>
      </ng-container>

      <ng-container matColumnDef="nombre_comercial">
        <th mat-header-cell *matHeaderCellDef>Nombre Comercial</th>
        <td mat-cell *matCellDef="let c">{{ c.nombre_comercial }}</td>
      </ng-container>

      <ng-container matColumnDef="direccion">
        <th mat-header-cell *matHeaderCellDef>Dirección</th>
        <td mat-cell *matCellDef="let c">{{ c.direccion }}</td>
      </ng-container>

      <ng-container matColumnDef="acciones">
        <th mat-header-cell *matHeaderCellDef>Acciones</th>
        <td mat-cell *matCellDef="let c">
          <button mat-icon-button color="primary">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="deleteCliente(c.id)">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </mat-card-content>
</mat-card>
