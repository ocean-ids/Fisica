<mat-card>
  <mat-card-header>
    <mat-card-title>Clientes</mat-card-title>
  </mat-card-header>

  <mat-card-content>
    <div class="actions">
      <button class="btn btn-primary" (click)="openDialog()">
        <i class="bi bi-plus-circle"></i> Nuevo Cliente
      </button>
    </div>

    <table mat-table [dataSource]="clientes" class="mat-elevation-z2">
      <ng-container matColumnDef="razon_social">
        <th mat-header-cell *matHeaderCellDef>Razón Social</th>
        <td mat-cell *matCellDef="let c">{{ c.razon_social }}</td>
      </ng-container>

      <ng-container matColumnDef="nombre_comercial">
        <th mat-header-cell *matHeaderCellDef>Nombre Comercial</th>
        <td mat-cell *matCellDef="let c">{{ c.nombre_comercial }}</td>
      </ng-container>

      <ng-container matColumnDef="direccion">
        <th mat-header-cell *matHeaderCellDef>Dirección</th>
        <td mat-cell *matCellDef="let c">{{ c.direccion }}</td>
      </ng-container>

      <ng-container matColumnDef="acciones">
        <th mat-header-cell *matHeaderCellDef>Acciones</th>
        <td mat-cell *matCellDef="let c">
          <button class="btn btn-sm btn-warning me-2" (click)="openDialog(c)">
            <i class="bi bi-pencil"></i> Editar
          </button>
          <button class="btn btn-sm btn-danger" (click)="confirmarEliminar(c)">
            <i class="bi bi-trash"></i> Eliminar
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </mat-card-content>
</mat-card>

<!-- Modal Confirmar Eliminación -->
<div class="modal fade show" *ngIf="showDeleteModal" style="display: block; background-color: rgba(0,0,0,0.5);">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Confirmar Eliminación</h5>
        <button type="button" class="btn-close" (click)="cancelarEliminar()"></button>
      </div>
      <div class="modal-body">
        <p>¿Está seguro que desea eliminar al cliente <strong>{{ clienteEliminar?.razon_social }}</strong>?</p>
        <p class="text-danger"><small>Esta acción no se puede deshacer.</small></p>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" (click)="cancelarEliminar()">Cancelar</button>
        <button type="button" class="btn btn-danger" (click)="eliminarCliente()">Eliminar</button>
      </div>
    </div>
  </div>
</div>
