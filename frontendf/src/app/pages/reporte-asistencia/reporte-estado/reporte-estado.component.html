<div class="p-4">
  <h5 class="mb-3 text-center">Reporte Zona</h5>
  <div class="mt-3" *ngIf="data.por_zona?.length">
    <div *ngFor="let zona of data.por_zona" class="d-flex justify-content-between align-items-center mb-2 p-2 border rounded">
      <strong>{{ zona.zona }}:</strong>
      <span>Asistencias: {{ zona.asistencias }}</span>
      <span> Faltas: {{ zona.faltas }}</span>
    </div>
  </div>
  <h5 class="mt-3 text-center">Reporte Global</h5>
  <div class="d-flex justify-content-between align-items-center mb-2 p-2 border rounded">
    <strong>Total:</strong> <span>{{ data.total }}</span>
    <strong> Asistencias:</strong> <span>{{ data.asistencias }}</span>
    <strong> Faltas:</strong> <span>{{ data.faltas }}</span>
  </div>
</div>
