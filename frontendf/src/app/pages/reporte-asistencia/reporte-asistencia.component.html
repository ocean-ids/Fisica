<div class="container-fluid p-3">
    <h3 class="text-center">Reporte de Asistencia</h3>
    <div class="d-flex flex-wrap gap-2 align-items-center mb-3">
        <input
            type="date"
            lang="es"
            class="form-control"
            style="max-width:200px"
            [value]="filtroFecha"
            (change)="onFechaChange($event)"
            placeholder="dd/mm/aaaa"
        >
        
    </div>
    <div *ngIf="loading" class="text-muted">Cargando...</div>

    <div class="table-responsive" *ngIf="!loading">
        <table class="table table-bordered table-hover">
            <thead class="table-light text-center">
                <tr class="text-center align-middle">
                    <th>Código</th>
                    <th>Cliente</th>
                    <th>Puesto (Tipo)</th>
                    <th style="width: 120px;">Horario</th>
                    <th>Nombre y Apellidos</th>
                    <th>Estado</th>
                    <th style="min-width: 200px;">Descripción</th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let r of reporte" class="text-center align-middle">
                    <td>{{ r.codigo || '-' }}</td>
                    <td>{{ r.cliente || '-' }}</td>
                    <td>{{ r.puesto || '-' }}</td>
                    <td>{{ r.horario || '-' }}</td>
                    <td >{{ r.nombre_apellidos || '-' }}</td>
                    <td><span [class]="estadoClass(r.estado)">{{ r.estado }}</span></td>
                    <td>{{ r.descripcion || '-' }}</td>
                </tr>
                <tr *ngIf="reporte.length === 0">
                    <td colspan="7" class="text-center text-muted">Sin datos</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
